name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests React
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: cookingbookreact/package-lock.json

      - name: Install dependencies
        working-directory: cookingbookreact
        run: npm ci

      - name: Run tests
        working-directory: cookingbookreact
        run: npm test -- --watchAll=false --forceExit --ci
